spring.application.name=Linked_jobs_Spring_boot_Automation_Services

# H2 In-Memory Database Configuration for Tests
spring.datasource.url=jdbc:h2:mem:testdb
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# JPA / Hibernate for H2
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.H2Dialect

# H2 Console (optional, useful for debugging)
spring.h2.console.enabled=true

# Logging Configuration
logging.level.com.jobbot=DEBUG
logging.level.org.hibernate.SQL=DEBUG
logging.level.org.hibernate.type.descriptor.sql.BasicBinder=TRACE

# Selenium Configuration
# Selenium is automatically excluded from test profile via @Profile("!test") in SeleniumConfig
# This prevents browser initialization during test execution

# Gemini AI - not needed for tests
gemini.api.key=test-key
