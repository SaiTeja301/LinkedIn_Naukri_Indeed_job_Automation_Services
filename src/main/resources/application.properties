spring.application.name=Linked_jobs_Spring_boot_Automation_Services

# Database Configuration
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:mysql://localhost:3306/job_automation_db}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver


# JPA / Hibernate
#spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.hibernate.ddl-auto=validate 
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# Server Configuration
server.port=8080

# Logging Configuration
logging.level.com.jobbot=DEBUG
logging.level.org.hibernate.SQL=DEBUG
logging.level.org.hibernate.type.descriptor.sql.BasicBinder=TRACE

# Gemini AI (placeholder — configure when integrating Gemini)
# gemini.api.key=YOUR_API_KEY_HERE

# ── Selenium Configuration ──────────────────────────────────────────────────
# Set to true to run Chrome in headless mode (useful in CI / server environments)
selenium.headless=false

# ── Naukri Configuration ────────────────────────────────────────────────────
# Maximum number of search-result pages to scrape per keyword
naukri.max.pages=5
# Naukri login page URL
naukri.login.url=https://www.naukri.com/nlogin/login
# Naukri recommended jobs URL (for logged-in users)
naukri.recommended.url=https://www.naukri.com/mnjuser/recommendedjobs

